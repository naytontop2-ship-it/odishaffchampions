<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ODISHA FF CHAMPIONSHIP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      background-image: 
        radial-gradient(circle at 20% 10%, rgba(255, 100, 0, 0.15), transparent 50%),
        radial-gradient(circle at 80% 90%, rgba(255, 100, 0, 0.1), transparent 50%),
        url('data:image/svg+xml;utf8,<svg xmlns="https://files.catbox.moe/hc3ip8.jpg" viewBox="0 0 100 100" opacity="0.03"><path d="M20 20 L30 15 L40 20 L35 30 L25 30 Z" fill="white"/><path d="M60 70 L70 65 L80 70 L75 80 L65 80 Z" fill="white"/></svg>');
      background-size: cover, cover, 100px 100px;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      padding: 1rem;
      color: white;
    }
    .container { width: 100%; max-width: 520px; }
    .header { text-align: center; margin-bottom: 1rem; }
    .logo-text {
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 2.6rem;
      background: linear-gradient(180deg, #FF6B00, #FF4500);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(255,100,0,0.5); margin-bottom: 0.2rem;
    }
    .subtitle {
      font-size: 1rem; font-weight: 700; color: #ccc; text-transform: uppercase;
      letter-spacing: 3px; background: rgba(255,255,255,0.05); display: inline-block;
      padding: 0.3rem 1.5rem; border-radius: 4px;
      border-left: 3px solid #FF6B00; border-right: 3px solid #FF6B00;
    }
    .card {
      background: rgba(20,20,20,0.85); backdrop-filter: blur(15px);
      border: 1px solid rgba(255,100,0,0.3); border-radius: 20px;
      padding: 2rem 1.5rem; box-shadow: 0 0 40px rgba(255,70,0,0.2), 0 10px 30px rgba(0,0,0,0.8);
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
      background: conic-gradient(from 90deg, transparent, rgba(255,100,0,0.05), transparent, rgba(255,100,0,0.05), transparent);
      animation: rotate 8s linear infinite; z-index: 0;
    }
    @keyframes rotate { 100% { transform: rotate(360deg); } }
    .card > * { position: relative; z-index: 1; }
    .squad-icon { display: flex; justify-content: center; margin-bottom: 1rem; }
    .squad-icon svg { width: 55px; height: 55px; fill: #FF6B00; filter: drop-shadow(0 0 10px rgba(255,107,0,0.6)); }
    .player-row {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,100,0,0.15);
      border-radius: 14px; padding: 1rem; margin-bottom: 1rem;
    }
    .player-row legend {
      font-weight: 700; font-size: 1rem; text-transform: uppercase;
      letter-spacing: 1px; color: #ff9f4b; margin-bottom: 0.6rem;
    }
    .dual-input { display: flex; gap: 0.6rem; flex-wrap: wrap; }
    .dual-input .input-group { flex: 1; min-width: 140px; }
    .input-group { margin-bottom: 0.8rem; }
    .input-group label {
      display: block; font-weight: 600; font-size: 0.85rem; text-transform: uppercase;
      letter-spacing: 1px; color: #ff9f4b; margin-bottom: 0.3rem;
    }
    .input-field {
      display: flex; align-items: center; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,100,0,0.3); border-radius: 10px;
      padding: 0 0.8rem; transition: 0.3s;
    }
    .input-field:focus-within {
      border-color: #FF6B00; box-shadow: 0 0 12px rgba(255,107,0,0.4);
      background: rgba(255,100,0,0.05);
    }
    .input-field .icon { color: #FF6B00; margin-right: 0.4rem; opacity: 0.8; }
    .input-field input {
      width: 100%; padding: 0.8rem 0; background: transparent; border: none;
      outline: none; color: white; font-family: 'Rajdhani', sans-serif;
      font-size: 1rem; font-weight: 600; letter-spacing: 1px;
    }
    .input-field input::placeholder { color: rgba(255,255,255,0.3); }
    .leader-field { border-color: #FF4500; background: rgba(255,68,0,0.05); }
    /* File upload style */
    .file-upload-wrapper {
      position: relative; margin-top: 0.3rem;
    }
    .file-upload-wrapper input[type="file"] {
      width: 100%; padding: 0.8rem; background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,100,0,0.5); border-radius: 10px;
      color: #ff9f4b; font-family: 'Rajdhani', sans-serif; cursor: pointer;
    }
    .submit-btn {
      width: 100%; padding: 1rem; margin-top: 1.5rem;
      border: none; background: linear-gradient(135deg, #FF6B00, #FF4500);
      color: white; font-family: 'Orbitron', sans-serif; font-weight: 700;
      font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px;
      border-radius: 12px; cursor: pointer; transition: 0.3s;
      box-shadow: 0 5px 20px rgba(255,69,0,0.5); border: 1px solid rgba(255,255,255,0.2);
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,69,0,0.7); }
    .footer-note { text-align: center; margin-top: 1rem; font-size: 0.8rem; color: #666; letter-spacing: 1px; }
    #status { text-align: center; margin-top: 1rem; font-weight: bold; color: #FF6B00; min-height: 1.5rem; }
    @media (max-width: 400px) {
      .logo-text { font-size: 2rem; }
      .dual-input { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo-text">ODISHA FF CHAMPIONSHIP</div>
      <div class="subtitle">Squad Registration</div>
      <div class="subtitle">MADE BY UDAY & NAYT </div>
    </div>

    <div class="card">
      <div class="squad-icon">
        <svg viewBox="0 0 24 24" xmlns="https://files.catbox.moe/hc3ip8.jpg">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
        </svg>
      </div>

      <!-- IMPORTANT: Replace the action URL with your own Formspree endpoint -->
      <form id="registrationForm" action="https://formspree.io/f/xjgzlgbr" method="POST" enctype="multipart/form-data">
        <!-- Squad Name -->
        <div class="input-group">
          <label>🏆 Squad Name</label>
          <div class="input-field">
            <span class="icon">⚔️</span>
            <input type="text" name="squadName" placeholder="e.g. FireStorm" required>
          </div>
        </div>

        <!-- Player 1 -->
        <div class="player-row">
          <legend>🎯 PLAYER 1</legend>
          <div class="dual-input">
            <div class="input-group">
              <label>Name</label>
              <div class="input-field"><span class="icon">👤</span><input type="text" name="p1name" placeholder="In-game name" required></div>
            </div>
            <div class="input-group">
              <label>UID</label>
              <div class="input-field"><span class="icon">🆔</span><input type="text" name="p1uid" placeholder="UID" required></div>
            </div>
          </div>
        </div>

        <!-- Player 2 -->
        <div class="player-row">
          <legend>🎯 PLAYER 2</legend>
          <div class="dual-input">
            <div class="input-group">
              <label>Name</label>
              <div class="input-field"><span class="icon">👤</span><input type="text" name="p2name" placeholder="In-game name" required></div>
            </div>
            <div class="input-group">
              <label>UID</label>
              <div class="input-field"><span class="icon">🆔</span><input type="text" name="p2uid" placeholder="UID" required></div>
            </div>
          </div>
        </div>

        <!-- Player 3 -->
        <div class="player-row">
          <legend>🎯 PLAYER 3</legend>
          <div class="dual-input">
            <div class="input-group">
              <label>Name</label>
              <div class="input-field"><span class="icon">👤</span><input type="text" name="p3name" placeholder="In-game name" required></div>
            </div>
            <div class="input-group">
              <label>UID</label>
              <div class="input-field"><span class="icon">🆔</span><input type="text" name="p3uid" placeholder="UID" required></div>
            </div>
          </div>
        </div>

        <!-- Player 4 -->
        <div class="player-row">
          <legend>🎯 PLAYER 4</legend>
          <div class="dual-input">
            <div class="input-group">
              <label>Name</label>
              <div class="input-field"><span class="icon">👤</span><input type="text" name="p4name" placeholder="In-game name" required></div>
            </div>
            <div class="input-group">
              <label>UID</label>
              <div class="input-field"><span class="icon">🆔</span><input type="text" name="p4uid" placeholder="UID" required></div>
            </div>
          </div>
        </div>

        <!-- Team Leader WhatsApp (optional, for contact) -->
        <div class="input-group">
          <label>📞 Team Leader WhatsApp Number</label>
          <div class="input-field leader-field">
            <span class="icon">📱</span>
            <input type="tel" name="leaderPhone" placeholder="+91 9876543210" required>
          </div>
        </div>



        <button type="submit" class="submit-btn">⚡ Submit Registration to Organizer's Gmail ⚡</button>
      </form>
      <p id="status"></p>
    </div>
    <div class="footer-note">All data & image sent securely to organizer's email</div>
  </div>

  <script>
    // Optional: Show status after submission (Formspree redirects by default)
    const form = document.getElementById('registrationForm');
    form.addEventListener('submit', function(e) {
      // You can add custom loading logic here; Formspree will handle the rest.
      document.getElementById('status').textContent = 'Sending registration...';
    });
  </script>
</body>
</html>
